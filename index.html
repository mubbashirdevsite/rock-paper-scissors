<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <!-- Header -->
        <header class="header">
            <h1>✊ Rock Paper Scissors</h1>
            <p>Choose your move and beat the computer</p>
        </header>

        <!-- Game Mode -->
        <section class="mode-section">

            <label>Game Mode:</label>

            <select id="gameMode">
                <option value="3">Best of 3</option>
                <option value="5">Best of 5</option>
                <option value="0">Endless Mode</option>
            </select>

        </section>

        <!-- Score Board -->
        <section class="scoreboard">

            <div>
                <h3>You</h3>
                <p id="userScore">0</p>
            </div>

            <div>
                <h3>Computer</h3>
                <p id="computerScore">0</p>
            </div>

            <div>
                <h3>Draw</h3>
                <p id="drawScore">0</p>
            </div>

        </section>

        <!-- Round Info -->
        <section class="round-info">

            <h2>Round: <span id="round">1</span></h2>

        </section>

        <!-- Choices -->
        <section class="choices">

            <button data-choice="rock">🪨 Rock</button>
            <button data-choice="paper">📄 Paper</button>
            <button data-choice="scissors">✂️ Scissors</button>

        </section>

        <!-- Result -->
        <section class="result">

            <h2 id="resultText">Make your move!</h2>

            <p id="detailText"></p>

        </section>

        <!-- Restart -->
        <button id="restartBtn" class="restart">
            🔄 Play Again
        </button>

    </main>

    <script src="script.js"></script>

</body>

</html>
